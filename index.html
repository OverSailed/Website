<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OverSailed</title>
  <style>
    body {
      margin: 0;
      background: #111318;
      color: #e8e8e8;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      background: #1f2633;
      padding: 22px;
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 4px;
    }

    main {
      max-width: 900px;
      margin: 48px auto;
      padding: 0 20px;
      text-align: center;
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      color: #cfd3dc;
      margin-bottom: 36px;
    }

    img {
      display: block;
      width: min(320px, 90vw);
      aspect-ratio: 3 / 4;
      object-fit: cover;
      margin: 0 auto;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <header>OverSailed</header>

  <main>
    <p>
      HELLO WORD!.<br>
      This is the webpage of our OverSailed Project <br>
      At the moment this website is under constuction <br>
      If you will, please contact me by discord: discord.gg/4YZHHEGe
    </p>

    <img src="sail.jpg" alt="Sail image">
  </main>
</body>
</html>
